<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artana C.F. - Resultados y Clasificación</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <img src="https://escudosdefutbolyequipaciones.com/images_esc3/ESPA/VALENCIA/escudos/ESC_ARTANA%20C.F..png" alt="Escudo Artana C.F." class="mini-logo">
                <span class="brand-text">ARTANA C.F.</span>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="btn-back">← VOLVER A PORTADA</a>
                <a href="#calendario">RESULTADOS</a>
                <a href="#clasificacion">CLASIFICACIÓN FFCV</a>
            </nav>
        </div>
    </header>

    <main class="dashboard-grid">
        
        <section class="card" id="calendario">
            <div class="card-header">
                <h3>⚽ CALENDARIO Y RESULTADOS</h3>
                <span class="sync-text"><span class="dot-green"></span> SINCRONIZACIÓN SIMULTÁNEA FFCV</span>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>JORNADA / FECHA</th>
                            <th>ENCUENTRO OFICIAL</th>
                            <th>RESULTADO / HORA</th>
                            <th>ESTADO</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-partidos">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="card" id="clasificacion">
            <div class="card-header">
                <h3>🔢 CLASIFICACIÓN TERCERA FFCV</h3>
                <span class="sync-badge">CONECTADO A FFCV...</span>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th>EQUIPO</th>
                            <th>PTS</th>
                            <th>PJ</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-clasificacion">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
